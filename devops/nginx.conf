server {
        listen 80;
        server_name anchr.jackjakarta.xyz;

        root /var/www/anchr;
        default_type text/x-shellscript;

        # bare domain: curl -fsSL https://anchr.jackjakarta.xyz | bash
        location = / {
                try_files /install.sh =404;
        }

        # explicit path still works too
        location = /install.sh {
                try_files /install.sh =404;
        }
}